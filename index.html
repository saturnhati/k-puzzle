<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-Puzzle</title>
  </head>
  <body class="theme-arcade">
    <div class="container">
      <button id="themeToggle" class="theme-toggle">☀</button>
      <div id="homeScreen">
        <h1>K-PUZZLE</h1>
        <p class="subtitle">SELECT YOUR PUZZLE<span class="cursor">█</span></p>
        <div class="puzzle-grid" id="puzzleGrid"></div>
      </div>

      <div id="gameScreen" class="hidden">
        <h1>K-PUZZLE</h1>
        <div class="game-controls">
          <button id="backBtn" class="back-btn">← SELECT</button>
          <button id="startBtn">START</button>
          <button id="shuffleBtn">SHUFFLE</button>
        </div>
        <div class="stats">
          <span>PIECES: <span id="placed">0</span>/100</span>
          <span>TIME: <span id="timer">00:00</span></span>
        </div>
        <div class="game-area">
          <div id="workspaceWrapper" class="workspace-wrapper">
            <div id="workspace" class="workspace"></div>
          </div>
          <div class="sidebar">
            <div class="preview-container">
              <h3>PREVIEW</h3>
              <button id="revealBtn" class="reveal-btn">REVEAL</button>
              <img id="previewImage" class="hidden" src="" alt="Preview" />
            </div>
            <div id="pieceTray" class="piece-tray"></div>
          </div>
        </div>
        <svg style="position: absolute; width: 0; height: 0;">
          <defs id="masks-container"></defs>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
